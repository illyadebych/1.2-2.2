<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна №2 - Дебич Ілля</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Моделювання руху тіла, кинутого під кутом</h2>

    <div class="controls">
        <div class="input-group">
            <label>Швидкість(м/с):</label>
            <input type="number" id="v0" value="50">
        </div>
        <div class="input-group">
            <label>Кут(градуси):</label>
            <input type="number" id="angle" value="45">
        </div>
        <div class="input-group">
            <label>Гравітація(м/с²):</label>
            <input type="number" id="g_val" value="9.81" step="0.1">
        </div>
        <button onclick="draw()">Розрахувати та анімувати</button>
    </div>

    <div id="canvas-container">
        <svg id="chart"></svg>
    </div>

    <div id="results"></div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="script.js"></script>
</body>
</html>
